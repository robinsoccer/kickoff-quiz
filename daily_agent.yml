name: ⚽ KickOff Quiz — Daily Agent
 
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      email_override:
        description: "Override digest email address (optional)"
        required: false
        default: ""
 
jobs:
  run-daily-agent:
    name: Fetch Headlines & Generate Quiz
    runs-on: ubuntu-latest
    timeout-minutes: 10
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Install dependencies
        run: npm install @anthropic-ai/sdk
 
      - name: Run daily agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_EMAIL: ${{ inputs.email_override || secrets.DIGEST_EMAIL }}
        run: node scripts/daily_agent.js
 
      - name: Commit & push quiz output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KickOff Quiz Bot"
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Daily quiz update — $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
 
      - name: Upload quiz artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-quiz-${{ github.run_id }}
          path: output/
          retention-days: 30

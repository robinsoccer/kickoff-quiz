name: ⚽ KickOff Quiz — Daily Agent
 
on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:
 
jobs:
  run-daily-agent:
    name: Fetch Headlines & Generate Quiz
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
 
      - name: Install dependencies
        run: npm install @anthropic-ai/sdk
 
      - name: Run daily agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: node scripts/daily_agent.js
 
      - name: Commit & push quiz output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "KickOff Quiz Bot"
          mkdir -p output
          git add output/
          git diff --staged --quiet || git commit -m "🤖 Daily quiz update — $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
